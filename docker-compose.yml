services:
  db:
    image: postgres:16-alpine
    container_name: pyshortner-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortener_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pyshortner-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: python:3.14-slim
    container_name: pyshortner-backend
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/shortener_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ALLOWED_ORIGINS: http://localhost:3000
    command: >
      sh -c "apt-get update && apt-get install -y curl && curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH=/root/.local/bin:\${PATH} && uv sync && uv run fastapi dev --host 0.0.0.0 --port 8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-slim
    container_name: pyshortner-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
